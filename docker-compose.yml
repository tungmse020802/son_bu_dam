version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: svam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: svam
      POSTGRES_USER: svam
      POSTGRES_PASSWORD: svam
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U svam -d svam']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
